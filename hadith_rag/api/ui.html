<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>يقين — الحديث النبوي</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
    }

    header {
      text-align: center;
      margin-bottom: 2rem;
    }
    header h1 {
      font-size: 2rem;
      color: #c9a96e;
      letter-spacing: 0.05em;
    }
    header p {
      color: #718096;
      margin-top: 0.4rem;
      font-size: 0.9rem;
    }

    .search-box {
      width: 100%;
      max-width: 720px;
      display: flex;
      gap: 0.5rem;
    }
    .search-box input {
      flex: 1;
      padding: 0.85rem 1.2rem;
      border-radius: 10px;
      border: 1px solid #2d3748;
      background: #1a1f2e;
      color: #e2e8f0;
      font-size: 1rem;
      font-family: inherit;
      direction: rtl;
      outline: none;
      transition: border-color 0.2s;
    }
    .search-box input:focus { border-color: #c9a96e; }
    .search-box input::placeholder { color: #4a5568; }

    .search-box button {
      padding: 0.85rem 1.6rem;
      border-radius: 10px;
      border: none;
      background: #c9a96e;
      color: #0f1117;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }
    .search-box button:hover { background: #e0c080; }
    .search-box button:disabled { background: #4a5568; cursor: not-allowed; }

    #status {
      margin-top: 1.2rem;
      font-size: 0.85rem;
      color: #718096;
      min-height: 1.2rem;
    }

    #result {
      width: 100%;
      max-width: 720px;
      margin-top: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1.2rem;
    }

    .answer-card {
      background: #1a1f2e;
      border: 1px solid #2d3748;
      border-right: 4px solid #c9a96e;
      border-radius: 12px;
      padding: 1.4rem 1.6rem;
      line-height: 1.9;
      white-space: pre-wrap;
      font-size: 1rem;
    }

    .section-title {
      font-size: 0.75rem;
      font-weight: 700;
      color: #718096;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 0.6rem;
    }

    .hadith-card {
      background: #1a1f2e;
      border: 1px solid #2d3748;
      border-radius: 10px;
      padding: 1rem 1.2rem;
    }
    .hadith-card .matn {
      font-size: 0.95rem;
      line-height: 1.8;
      margin-bottom: 0.6rem;
      color: #e2e8f0;
    }
    .hadith-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      font-size: 0.75rem;
    }
    .badge {
      padding: 0.2rem 0.6rem;
      border-radius: 6px;
      background: #2d3748;
      color: #a0aec0;
    }
    .badge.sahih  { background: #1a3a2a; color: #68d391; }
    .badge.hasan  { background: #2a3a1a; color: #b7e278; }
    .badge.daif   { background: #3a2a1a; color: #f6ad55; }
    .badge.mawdu  { background: #3a1a1a; color: #fc8181; }

    .warnings {
      background: #2a1e0f;
      border: 1px solid #744210;
      border-radius: 8px;
      padding: 0.8rem 1rem;
      font-size: 0.85rem;
      color: #f6ad55;
      line-height: 1.7;
    }

    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid #4a5568;
      border-top-color: #c9a96e;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-left: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .error-msg {
      background: #2a1010;
      border: 1px solid #744040;
      border-radius: 8px;
      padding: 0.8rem 1rem;
      color: #fc8181;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>

<header>
  <h1>يقين ✦ الحديث النبوي</h1>
  <p>ابحث في 155,000+ حديث واحصل على إجابة موثقة بالمصادر</p>
</header>

<div class="search-box">
  <input id="queryInput" type="text" placeholder="اكتب سؤالك... مثال: ما صحة حديث من غشنا فليس منا" />
  <button id="askBtn" onclick="ask()">سؤال</button>
</div>

<div id="status"></div>
<div id="result"></div>

<script>
  const input  = document.getElementById('queryInput');
  const btn    = document.getElementById('askBtn');
  const status = document.getElementById('status');
  const result = document.getElementById('result');

  input.addEventListener('keydown', e => { if (e.key === 'Enter') ask(); });

  function gradeBadge(hadith) {
    const map = { sahih: 'صحيح', hasan: 'حسن', daif: 'ضعيف', mawdu: 'موضوع', unknown: 'غير متحقق' };
    const label = hadith.grade_ar || hadith.ruling || map[hadith.grade] || hadith.grade || 'غير محدد';
    return `<span class="badge ${hadith.grade || 'unknown'}">${escHtml(label)}</span>`;
  }

  async function ask() {
    const query = input.value.trim();
    if (!query) return;

    btn.disabled = true;
    result.innerHTML = '';
    status.innerHTML = 'جارٍ المعالجة… <span class="spinner"></span>';

    try {
      const res = await fetch('/query', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ query })
      });

      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.detail || `HTTP ${res.status}`);
      }

      const data = await res.json();
      status.textContent = `✅ اكتملت في ${(data.timing?.total || 0).toFixed(1)} ثانية`;

      let html = '';

      // Answer
      if (data.answer) {
        html += `
          <div>
            <div class="section-title">الإجابة</div>
            <div class="answer-card">${escHtml(data.answer)}</div>
          </div>`;
      }

      // Warnings
      if (data.warnings?.length) {
        html += `<div class="warnings">${data.warnings.map(escHtml).join('<br>')}</div>`;
      }

      // Hadiths
      if (data.hadiths?.length) {
        const cards = data.hadiths.map((h, i) => `
          <div class="hadith-card">
            <div class="matn">${escHtml(h.text_ar)}</div>
            <div class="hadith-meta">
              <span class="badge">#${i + 1}</span>
              ${gradeBadge(h)}
              ${h.rawi     ? `<span class="badge">الراوي: ${escHtml(h.rawi)}</span>` : ''}
              ${h.masdar   ? `<span class="badge">المصدر: ${escHtml(h.masdar)}</span>` : ''}
              ${h.safha_raqam ? `<span class="badge">${escHtml(h.safha_raqam)}</span>` : ''}
              ${h.muhaddith ? `<span class="badge">المحدّث: ${escHtml(h.muhaddith)}</span>` : ''}
              ${h.ruling ? `<span class="badge">الحكم التفصيلي: ${escHtml(h.ruling)}</span>` : ''}
            </div>
          </div>`).join('');

        html += `
          <div>
            <div class="section-title">الأحاديث المسترجعة (${data.hadiths.length})</div>
            ${cards}
          </div>`;
      }

      result.innerHTML = html;

    } catch (e) {
      status.textContent = '';
      result.innerHTML = `<div class="error-msg">❌ ${escHtml(e.message)}</div>`;
    } finally {
      btn.disabled = false;
    }
  }

  function escHtml(str) {
    return String(str ?? '')
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
</script>
</body>
</html>
