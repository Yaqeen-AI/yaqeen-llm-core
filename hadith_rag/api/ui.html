<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>يقين — الحديث النبوي</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
      background: #f3f4f6;
      color: #1f2937;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
    }

    .container {
      width: 100%;
      max-width: 840px;
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      padding: 1.5rem;
    }

    header {
      text-align: center;
      margin-bottom: 1.4rem;
    }
    header h1 {
      font-size: 1.6rem;
      color: #111827;
      letter-spacing: 0;
      font-weight: 600;
    }
    header p {
      color: #6b7280;
      margin-top: 0.35rem;
      font-size: 0.92rem;
    }

    .search-box {
      width: 100%;
      max-width: 100%;
      display: flex;
      gap: 0.5rem;
      align-items: center;
    }
    .search-box input {
      flex: 1;
      padding: 0.85rem 1.2rem;
      border-radius: 6px;
      border: 1px solid #d1d5db;
      background: #ffffff;
      color: #111827;
      font-size: 1rem;
      font-family: inherit;
      direction: rtl;
      outline: none;
      transition: border-color 0.2s;
    }
    .search-box input:focus {
      border-color: #374151;
      box-shadow: 0 0 0 2px #e5e7eb;
    }
    .search-box input::placeholder { color: #9ca3af; }

    .search-box select {
      padding: 0.85rem 0.8rem;
      border-radius: 6px;
      border: 1px solid #d1d5db;
      background: #ffffff;
      color: #111827;
      font-size: 0.95rem;
      font-family: inherit;
      outline: none;
      min-width: 130px;
    }
    .search-box select:focus {
      border-color: #374151;
      box-shadow: 0 0 0 2px #e5e7eb;
    }

    .search-box button {
      padding: 0.85rem 1.6rem;
      border-radius: 6px;
      border: none;
      background: #111827;
      color: #ffffff;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }
    .search-box button:hover { background: #1f2937; }
    .search-box button:disabled { background: #9ca3af; cursor: not-allowed; }

    #status {
      margin-top: 1rem;
      font-size: 0.85rem;
      color: #6b7280;
      min-height: 1.2rem;
    }

    #result {
      width: 100%;
      max-width: 100%;
      margin-top: 1rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .answer-card {
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 6px;
      padding: 1.4rem 1.6rem;
      line-height: 1.85;
      white-space: pre-wrap;
      font-size: 1rem;
    }

    .section-title {
      font-size: 0.75rem;
      font-weight: 600;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 0.5rem;
    }

    .hadith-card {
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 6px;
      padding: 0.9rem 1rem;
    }
    .hadith-card .matn {
      font-size: 0.95rem;
      line-height: 1.8;
      margin-bottom: 0.5rem;
      color: #111827;
    }
    .hadith-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      font-size: 0.75rem;
    }
    .badge {
      padding: 0.2rem 0.6rem;
      border-radius: 3px;
      background: #f3f4f6;
      color: #4b5563;
      border: 1px solid #e5e7eb;
    }
    .badge.sahih  { background: #ecfdf3; color: #166534; border-color: #bbf7d0; }
    .badge.hasan  { background: #f0fdf4; color: #3f6212; border-color: #d9f99d; }
    .badge.daif   { background: #fffbeb; color: #92400e; border-color: #fde68a; }
    .badge.mawdu  { background: #fef2f2; color: #991b1b; border-color: #fecaca; }

    .warnings {
      background: #fffbeb;
      border: 1px solid #fcd34d;
      border-radius: 6px;
      padding: 0.8rem 1rem;
      font-size: 0.85rem;
      color: #92400e;
      line-height: 1.7;
    }

    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid #d1d5db;
      border-top-color: #374151;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-left: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .error-msg {
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: 6px;
      padding: 0.8rem 1rem;
      color: #991b1b;
      font-size: 0.9rem;
    }

    @media (max-width: 780px) {
      .container {
        padding: 1rem;
      }

      .search-box {
        flex-direction: column;
        align-items: stretch;
      }

      .search-box select,
      .search-box button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
<main class="container">
  <header>
    <h1>يقين — الحديث النبوي</h1>
    <p>ابحث في الأحاديث واحصل على إجابة موثقة بالمصادر</p>
  </header>

  <div class="search-box">
    <input id="queryInput" type="text" placeholder="اكتب سؤالك... مثال: ما صحة حديث من غشنا فليس منا" />
    <select id="retrievalMode" aria-label="طريقة الاسترجاع">
      <option value="both">TF-IDF + BM25</option>
      <option value="tfidf">TF-IDF فقط</option>
      <option value="bm25">BM25 فقط</option>
    </select>
    <button id="askBtn" onclick="ask()">سؤال</button>
  </div>

  <div id="status"></div>
  <div id="result"></div>
</main>

<script>
  const input  = document.getElementById('queryInput');
  const retrievalMode = document.getElementById('retrievalMode');
  const btn    = document.getElementById('askBtn');
  const status = document.getElementById('status');
  const result = document.getElementById('result');

  input.addEventListener('keydown', e => { if (e.key === 'Enter') ask(); });

  function gradeBadge(hadith) {
    const map = { sahih: 'صحيح', hasan: 'حسن', daif: 'ضعيف', mawdu: 'موضوع', unknown: 'غير متحقق' };
    const label = hadith.grade_ar || hadith.ruling || map[hadith.grade] || hadith.grade || 'غير محدد';
    return `<span class="badge ${hadith.grade || 'unknown'}">${escHtml(label)}</span>`;
  }

  async function ask() {
    const query = input.value.trim();
    const mode = retrievalMode.value || 'both';
    if (!query) return;

    btn.disabled = true;
    result.innerHTML = '';
    status.innerHTML = 'جارٍ المعالجة… <span class="spinner"></span>';

    try {
      const res = await fetch('/query', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ query, retrieval_mode: mode })
      });

      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.detail || `HTTP ${res.status}`);
      }

      const data = await res.json();
      status.textContent = `اكتملت المعالجة في ${(data.timing?.total || 0).toFixed(1)} ثانية`;

      let html = '';

      // Answer
      if (data.answer) {
        html += `
          <div>
            <div class="section-title">الإجابة</div>
            <div class="answer-card">${escHtml(data.answer)}</div>
          </div>`;
      }

      // Warnings
      if (data.warnings?.length) {
        html += `<div class="warnings">${data.warnings.map(escHtml).join('<br>')}</div>`;
      }

      // Hadiths
      if (data.hadiths?.length) {
        const cards = data.hadiths.map((h, i) => `
          <div class="hadith-card">
            <div class="matn">${escHtml(h.text_ar)}</div>
            <div class="hadith-meta">
              <span class="badge">#${i + 1}</span>
              ${gradeBadge(h)}
              ${h.rawi     ? `<span class="badge">الراوي: ${escHtml(h.rawi)}</span>` : ''}
              ${h.masdar   ? `<span class="badge">المصدر: ${escHtml(h.masdar)}</span>` : ''}
              ${h.safha_raqam ? `<span class="badge">${escHtml(h.safha_raqam)}</span>` : ''}
              ${h.muhaddith ? `<span class="badge">المحدّث: ${escHtml(h.muhaddith)}</span>` : ''}
              ${h.ruling ? `<span class="badge">الحكم التفصيلي: ${escHtml(h.ruling)}</span>` : ''}
            </div>
          </div>`).join('');

        html += `
          <div>
            <div class="section-title">الأحاديث المسترجعة (${data.hadiths.length})</div>
            ${cards}
          </div>`;
      }

      result.innerHTML = html;

    } catch (e) {
      status.textContent = '';
      result.innerHTML = `<div class="error-msg">حدث خطأ: ${escHtml(e.message)}</div>`;
    } finally {
      btn.disabled = false;
    }
  }

  function escHtml(str) {
    return String(str ?? '')
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
</script>
</body>
</html>
