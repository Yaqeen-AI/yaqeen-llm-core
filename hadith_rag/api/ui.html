<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>يقين — الحديث النبوي</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
      background: #f3f4f6;
      color: #1f2937;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
    }

    .container {
      width: 100%;
      max-width: 840px;
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      padding: 1.5rem;
    }

    header {
      text-align: center;
      margin-bottom: 1.4rem;
    }
    header h1 {
      font-size: 1.6rem;
      color: #111827;
      letter-spacing: 0;
      font-weight: 600;
    }
    header p {
      color: #6b7280;
      margin-top: 0.35rem;
      font-size: 0.92rem;
    }

    .search-box {
      width: 100%;
      max-width: 100%;
      display: flex;
      gap: 0.5rem;
      align-items: center;
    }
    .search-box input {
      flex: 1;
      padding: 0.85rem 1.2rem;
      border-radius: 6px;
      border: 1px solid #d1d5db;
      background: #ffffff;
      color: #111827;
      font-size: 1rem;
      font-family: inherit;
      direction: rtl;
      outline: none;
      transition: border-color 0.2s;
    }
    .search-box input:focus {
      border-color: #374151;
      box-shadow: 0 0 0 2px #e5e7eb;
    }
    .search-box input::placeholder { color: #9ca3af; }

    .search-box select {
      padding: 0.85rem 0.8rem;
      border-radius: 6px;
      border: 1px solid #d1d5db;
      background: #ffffff;
      color: #111827;
      font-size: 0.95rem;
      font-family: inherit;
      outline: none;
      min-width: 130px;
    }
    .search-box select:focus {
      border-color: #374151;
      box-shadow: 0 0 0 2px #e5e7eb;
    }

    .search-box button {
      padding: 0.85rem 1.6rem;
      border-radius: 6px;
      border: none;
      background: #111827;
      color: #ffffff;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }
    .search-box button:hover { background: #1f2937; }
    .search-box button:disabled { background: #9ca3af; cursor: not-allowed; }

    #status {
      margin-top: 1rem;
      font-size: 0.85rem;
      color: #6b7280;
      min-height: 1.2rem;
    }

    #result {
      width: 100%;
      max-width: 100%;
      margin-top: 1rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .answer-card {
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 6px;
      padding: 1.4rem 1.6rem;
      line-height: 1.85;
      white-space: normal;
      font-size: 1rem;
    }

    .answer-body p {
      margin: 0 0 0.8rem;
      color: #111827;
    }
    .answer-body p:last-child {
      margin-bottom: 0;
    }
    .answer-body ul,
    .answer-body ol {
      margin: 0.2rem 1.1rem 0.9rem 0;
      padding: 0;
    }
    .answer-body li {
      margin-bottom: 0.45rem;
    }
    .answer-body h3 {
      font-size: 1rem;
      margin: 0.3rem 0 0.7rem;
      color: #111827;
      font-weight: 700;
    }

    .section-title {
      font-size: 0.75rem;
      font-weight: 600;
      color: #6b7280;
      letter-spacing: 0.08em;
      margin-bottom: 0.5rem;
    }

    .meta-card {
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 6px;
      padding: 0.9rem 1rem;
    }
    .meta-grid {
      display: grid;
      gap: 0.5rem;
      grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
    }
    .meta-item {
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 6px;
      padding: 0.55rem 0.7rem;
      font-size: 0.86rem;
      line-height: 1.55;
    }
    .meta-item .label {
      color: #6b7280;
      display: block;
      font-size: 0.75rem;
      margin-bottom: 0.2rem;
    }
    .meta-item .value {
      color: #111827;
      font-weight: 600;
    }

    .latency-card {
      background: linear-gradient(135deg, #f8fafc 0%, #eef2ff 100%);
      border: 1px solid #dbeafe;
      border-radius: 8px;
      padding: 1rem;
    }
    .latency-grid {
      display: grid;
      gap: 0.55rem;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    }
    .latency-item {
      display: flex;
      justify-content: space-between;
      gap: 0.7rem;
      align-items: center;
      background: rgba(255, 255, 255, 0.82);
      border: 1px solid #e5e7eb;
      border-radius: 7px;
      padding: 0.55rem 0.7rem;
      font-size: 0.84rem;
    }
    .latency-name { color: #4b5563; }
    .latency-value {
      direction: ltr;
      color: #0f172a;
      font-weight: 700;
      white-space: nowrap;
    }
    .latency-item.hot {
      border-color: #fed7aa;
      background: #fff7ed;
    }
    .latency-item.cache {
      border-color: #bbf7d0;
      background: #f0fdf4;
    }

    .hadith-card {
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 6px;
      padding: 0.9rem 1rem;
    }
    .hadith-card .matn {
      font-size: 0.95rem;
      line-height: 1.8;
      margin-bottom: 0.5rem;
      color: #111827;
    }
    .hadith-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      font-size: 0.75rem;
    }
    .badge {
      padding: 0.2rem 0.6rem;
      border-radius: 3px;
      background: #f3f4f6;
      color: #4b5563;
      border: 1px solid #e5e7eb;
    }
    .badge.sahih  { background: #ecfdf3; color: #166534; border-color: #bbf7d0; }
    .badge.hasan  { background: #f0fdf4; color: #3f6212; border-color: #d9f99d; }
    .badge.daif   { background: #fffbeb; color: #92400e; border-color: #fde68a; }
    .badge.mawdu  { background: #fef2f2; color: #991b1b; border-color: #fecaca; }

    .warnings {
      background: #fffbeb;
      border: 1px solid #fcd34d;
      border-radius: 6px;
      padding: 0.8rem 1rem;
      font-size: 0.85rem;
      color: #92400e;
      line-height: 1.7;
    }

    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid #d1d5db;
      border-top-color: #374151;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-left: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .error-msg {
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: 6px;
      padding: 0.8rem 1rem;
      color: #991b1b;
      font-size: 0.9rem;
    }

    @media (max-width: 780px) {
      .container {
        padding: 1rem;
      }

      .search-box {
        flex-direction: column;
        align-items: stretch;
      }

      .search-box select,
      .search-box button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
<main class="container">
  <header>
    <h1>يقين — الحديث النبوي</h1>
    <p>ابحث في الأحاديث واحصل على إجابة موثقة بالمصادر</p>
  </header>

  <div class="search-box">
    <input id="queryInput" type="text" placeholder="اكتب سؤالك... مثال: ما صحة حديث من غشنا فليس منا" />
    <select id="retrievalMode" aria-label="طريقة الاسترجاع">
      <option value="both">TF-IDF + BM25</option>
      <option value="tfidf">TF-IDF فقط</option>
      <option value="bm25">BM25 فقط</option>
    </select>
    <button id="askBtn" onclick="ask()">سؤال</button>
  </div>

  <div id="status"></div>
  <div id="result"></div>
</main>

<script>
  const input  = document.getElementById('queryInput');
  const retrievalMode = document.getElementById('retrievalMode');
  const btn    = document.getElementById('askBtn');
  const status = document.getElementById('status');
  const result = document.getElementById('result');

  input.addEventListener('keydown', e => { if (e.key === 'Enter') ask(); });

  function gradeBadge(hadith) {
    const map = { sahih: 'صحيح', hasan: 'حسن', daif: 'ضعيف', mawdu: 'موضوع', unknown: 'غير متحقق' };
    const label = hadith.grade_ar || hadith.ruling || map[hadith.grade] || hadith.grade || 'غير محدد';
    return `<span class="badge ${hadith.grade || 'unknown'}">${escHtml(label)}</span>`;
  }

  async function ask() {
    const query = input.value.trim();
    const mode = retrievalMode.value || 'both';
    if (!query) return;

    btn.disabled = true;
    result.innerHTML = '';
    status.innerHTML = 'جارٍ المعالجة… <span class="spinner"></span>';
    const startedAt = performance.now();
    const ticker = setInterval(() => {
      const elapsed = ((performance.now() - startedAt) / 1000).toFixed(1);
      status.innerHTML = `جارٍ المعالجة… ${elapsed} ثانية <span class="spinner"></span>`;
    }, 250);

    try {
      const res = await fetch('/query', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ query, retrieval_mode: mode })
      });

      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.detail || `HTTP ${res.status}`);
      }

      const data = await res.json();
      status.textContent = `اكتملت المعالجة في ${(data.timing?.total || 0).toFixed(1)} ثانية`;

      let html = '';

      html += renderLatencyPanel(data.timing || {});

      // Evidence quality block
      html += `
        <div>
          <div class="section-title">جودة الأدلة</div>
          <div class="meta-card">
            <div class="meta-grid">
              <div class="meta-item"><span class="label">توثيق الأدلة</span><span class="value">${escHtml(toArabicSignal(data.authenticity_of_evidence))}</span></div>
              <div class="meta-item"><span class="label">صلة الأدلة بالسؤال</span><span class="value">${escHtml(toArabicSignal(data.relevance_to_question))}</span></div>
              <div class="meta-item"><span class="label">الكفاية النهائية</span><span class="value">${escHtml(toArabicSignal(data.final_sufficiency))}</span></div>
            </div>
          </div>
        </div>`;

      // Answer
      if (data.answer) {
        const cleanedAnswer = cleanupAnswerText(data.answer);
        html += `
          <div>
            <div class="section-title">الإجابة</div>
            <div class="answer-card answer-body">${formatAnswerHtml(cleanedAnswer)}</div>
          </div>`;
      }

      // Warnings
      if (data.warnings?.length) {
        html += `<div class="warnings">${data.warnings.map(escHtml).join('<br>')}</div>`;
      }

      // Hadiths
      if (data.hadiths?.length) {
        const cards = data.hadiths.map((h, i) => `
          <div class="hadith-card">
            <div class="matn">${escHtml(h.text_ar)}</div>
            <div class="hadith-meta">
              <span class="badge">#${i + 1}</span>
              ${gradeBadge(h)}
              ${h.rawi     ? `<span class="badge">الراوي: ${escHtml(h.rawi)}</span>` : ''}
              ${h.masdar   ? `<span class="badge">المصدر: ${escHtml(h.masdar)}</span>` : ''}
              ${h.safha_raqam ? `<span class="badge">${escHtml(h.safha_raqam)}</span>` : ''}
              ${h.muhaddith ? `<span class="badge">المحدّث: ${escHtml(h.muhaddith)}</span>` : ''}
              ${h.ruling ? `<span class="badge">الحكم التفصيلي: ${escHtml(h.ruling)}</span>` : ''}
            </div>
          </div>`).join('');

        html += `
          <div>
            <div class="section-title">الأحاديث المسترجعة (${data.hadiths.length})</div>
            ${cards}
          </div>`;
      }

      if (data.ignored_narrations?.length) {
        const ignored = data.ignored_narrations.map((item, i) => `
          <div class="hadith-card">
            <div class="matn">${escHtml(item.matn_snippet || '')}</div>
            <div class="hadith-meta">
              <span class="badge">#${i + 1}</span>
              <span class="badge">الدرجة: ${escHtml(item.grade_ar || item.grade || 'غير محدد')}</span>
              <span class="badge">سبب الاستبعاد: ${escHtml(item.reason || '—')}</span>
            </div>
          </div>`).join('');

        html += `
          <div>
            <div class="section-title">الروايات المستبعدة (${data.ignored_narrations.length})</div>
            ${ignored}
          </div>`;
      }

      result.innerHTML = html;

    } catch (e) {
      status.textContent = '';
      result.innerHTML = `<div class="error-msg">حدث خطأ: ${escHtml(e.message)}</div>`;
    } finally {
      clearInterval(ticker);
      btn.disabled = false;
    }
  }

  function escHtml(str) {
    return String(str ?? '')
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function toArabicSignal(value) {
    const key = String(value || '').trim().toLowerCase();
    const map = {
      sufficient: 'كافٍ',
      insufficient: 'غير كافٍ',
      direct: 'مباشرة',
      weak: 'ضعيفة',
      partial: 'جزئية'
    };
    return map[key] || value || 'غير متاح';
  }

  function formatSeconds(value) {
    const n = Number(value || 0);
    if (!Number.isFinite(n)) return '—';
    if (n < 0.005) return '<0.01s';
    if (n < 1) return `${n.toFixed(2)}s`;
    return `${n.toFixed(1)}s`;
  }

  function renderLatencyPanel(timing) {
    const rows = [
      ['total', 'الإجمالي', 'hot'],
      ['preprocess', 'تحليل السؤال'],
      ['hybrid_retrieval', 'الاسترجاع الهجين'],
      ['retrieval_dense', 'الاسترجاع الدلالي'],
      ['retrieval_tfidf', 'TF-IDF'],
      ['retrieval_bm25', 'BM25'],
      ['retrieval_fusion', 'دمج النتائج'],
      ['retrieval_dedup', 'إزالة التكرار'],
      ['rerank', 'إعادة الترتيب'],
      ['generate', 'مرحلة التوليد', 'hot'],
      ['generation_llm_api', 'استدعاء Gemma', 'hot'],
      ['generation_evidence_audit', 'تدقيق الأدلة'],
      ['generation_context_formatting', 'بناء السياق'],
      ['generation_grounding_verification', 'فحص التوثيق'],
      ['generation_total', 'تفاصيل التوليد'],
    ];

    const timingItems = rows
      .filter(([key]) => timing[key] !== undefined)
      .map(([key, label, tone]) => `
        <div class="latency-item ${tone || ''}">
          <span class="latency-name">${escHtml(label)}</span>
          <span class="latency-value">${formatSeconds(timing[key])}</span>
        </div>`)
      .join('');

    const cacheHit = Number(timing.generate_cache_hit || 0) === 1;
    const fastPath = Number(timing.generation_fast_path || 0) === 1;
    const rerankSkipped = Number(timing.rerank_skipped_exact_lookup || 0) === 1;
    const promptChars = timing.generation_prompt_chars;
    const maxTokens = timing.generation_max_output_tokens;
    const thinkingBudget = timing.generation_thinking_budget;
    const extras = [
      cacheHit ? `<div class="latency-item cache"><span class="latency-name">Cache</span><span class="latency-value">hit</span></div>` : '',
      fastPath ? `<div class="latency-item cache"><span class="latency-name">مسار سريع</span><span class="latency-value">بدون LLM</span></div>` : '',
      rerankSkipped ? `<div class="latency-item cache"><span class="latency-name">إعادة الترتيب</span><span class="latency-value">تم تخطيها بأمان</span></div>` : '',
      promptChars ? `<div class="latency-item"><span class="latency-name">حجم البرومبت</span><span class="latency-value">${Number(promptChars).toLocaleString()} chars</span></div>` : '',
      maxTokens ? `<div class="latency-item"><span class="latency-name">سقف الخرج</span><span class="latency-value">${Number(maxTokens).toLocaleString()} tokens</span></div>` : '',
      thinkingBudget !== undefined ? `<div class="latency-item"><span class="latency-name">ميزانية التفكير</span><span class="latency-value">${Number(thinkingBudget).toLocaleString()}</span></div>` : '',
    ].filter(Boolean).join('');

    if (!timingItems && !extras) return '';
    return `
      <div>
        <div class="section-title">زمن المكوّنات</div>
        <div class="latency-card">
          <div class="latency-grid">${timingItems}${extras}</div>
        </div>
      </div>`;
  }

  function cleanupAnswerText(text) {
    let out = String(text || '').replace(/\r\n/g, '\n').trim();

    out = out.replace(/^\s*Authenticity of evidence\s*:\s*.*$/gim, '');
    out = out.replace(/^\s*Relevance to question\s*:\s*.*$/gim, '');
    out = out.replace(/^\s*Final sufficiency\s*:\s*.*$/gim, '');
    out = out.replace(/^\s*Answer\s*:\s*/gim, '');
    out = out.replace(/(?:\n|^)\s*Excluded narrations\s*:[\s\S]*$/i, '');

    out = out.replace(/\n{3,}/g, '\n\n').trim();
    return out;
  }

  function formatInline(text) {
    let safe = escHtml(text || '');
    safe = safe.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    safe = safe.replace(/`([^`]+)`/g, '<code>$1</code>');
    return safe;
  }

  function formatAnswerHtml(text) {
    const lines = String(text || '').split('\n');
    const html = [];
    let listType = null;

    const closeList = () => {
      if (listType) {
        html.push(`</${listType}>`);
        listType = null;
      }
    };

    for (const rawLine of lines) {
      const line = rawLine.trim();

      if (!line) {
        closeList();
        continue;
      }

      const headingMatch = line.match(/^\*\*(.+?)\*\*:?$/);
      if (headingMatch) {
        closeList();
        html.push(`<h3>${formatInline(headingMatch[1])}</h3>`);
        continue;
      }

      const bulletMatch = line.match(/^[-*]\s+(.+)$/);
      if (bulletMatch) {
        if (listType !== 'ul') {
          closeList();
          listType = 'ul';
          html.push('<ul>');
        }
        html.push(`<li>${formatInline(bulletMatch[1])}</li>`);
        continue;
      }

      const numberedMatch = line.match(/^\d+[\.)]\s+(.+)$/);
      if (numberedMatch) {
        if (listType !== 'ol') {
          closeList();
          listType = 'ol';
          html.push('<ol>');
        }
        html.push(`<li>${formatInline(numberedMatch[1])}</li>`);
        continue;
      }

      closeList();
      html.push(`<p>${formatInline(line)}</p>`);
    }

    closeList();
    return html.length ? html.join('') : '<p>لا توجد إجابة نصية.</p>';
  }
</script>
</body>
</html>
